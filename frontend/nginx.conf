# Nginx config para servir el SPA de Vite con seguridad y cache correctos.

server {
    # Puerto alto no estándar (4173) para evitar conflictos con otros proyectos.
    # El reverse proxy de Dokploy (Traefik/Caddy) enruta el tráfico HTTPS público
    # hacia este puerto interno del contenedor.
    listen 4173;
    listen [::]:4173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Logs compactos (en Dokploy usualmente hay un layer de logs por encima).
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Compresión ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---------- Headers de seguridad ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------- Cache: assets hasheados por Vite ----------
    # Vite nombra los assets con hash (assets/index-abc123.js), así que son seguros de cachear 1 año.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------- Cache: archivos de imagen ----------
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---------- index.html: nunca cachear ----------
    # Crítico para que los deploys nuevos se vean sin que el usuario tenga que hard-reload.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ---------- SPA fallback ----------
    # Cualquier ruta no encontrada (ej. /chat/abc) cae al index.html.
    # Aunque hoy no usamos routing, dejarlo configurado evita 404 si en el futuro se agrega.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- Bloqueo de archivos sensibles ----------
    location ~ /\.(?!well-known) {
        deny all;
    }
}
